<div class="min-h-screen bg-gradient-to-br from-slate-950 via-slate-900 to-slate-950 overflow-x-hidden">
    <div class="flex w-full">
        <app-sidebar [activeView]="activeView()" (changeView)="activeView.set($event)" (collapsedChange)="collapsedSidebar.set($event)" [numAddComparisons]="incrementComparisons"></app-sidebar>
        <div class="transition-all duration-500 ease-in-out {{collapsedSidebar() ? 'ml-12 sm:ml-16' : 'ml-64'}} w-full">
            @if (activeView() == "comparator") {
                <app-comparator [vehicleFromFavourites]="vehicleFromFavourites()"></app-comparator>
            } @else if (activeView() == "favourites") {
                <app-favourites (analyse)="onAnalyseFromFavourites($event)"></app-favourites>
            } @else if (activeView() == "settings") {
                <app-profile-user></app-profile-user>
            } @else if(activeView() == "ia") {
                <app-ai></app-ai>
                }
        </div>
        
    </div>
</div>
