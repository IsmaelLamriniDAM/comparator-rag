<section class="pt-20 lg:pt-40">
    <div class="text-center max-w-4xl mx-auto mb-6">
        <h2 class="text-3xl sm:text-4xl font-bold text-white mb-4">Todo lo que necesitas para decidir mejor</h2>
        <p class="text-slate-400 max-w-2xl mx-auto">Mi TFG ofrece herramientas diseñadas específicamente para profesionales en el sector de vehículos.</p>
    </div>
    <div class="grid grid-cols-1 lg:grid-cols-2 lg:grid-cols-3 gap-6">
        @for (f of features; track f.title) {
            <div class="glass-card rounded-2xl p-6 transition-all duration-300">
                <div class="w-12 h-12 rounded-xl bg-gradient-to-r from-[#39BDFF]/20 to-[#64DDFF]/20 flex items-center justify-center mb-6">
                    <i [class]="f.icon + ' pi text-[#39BDFF]'"></i>
                </div>
                <h3 class="text-xl font-semibold text-white mb-2">{{f.title}}</h3>
                <h3 class="text-slate-400">{{f.description}}</h3>
            </div>
        }
    </div>
</section>
