<div class="sticky top-5 z-50">
    <div class="max-w-[90%] mx-auto">
        <header class="bg-white/15 backdrop-blur-lg rounded-3xl shadow-xl text-gray-300 font-semibold border border-1 border-white/35 relative">
            <div class="absolute inset-0 bg-gradient-to-r from-white/[0.08] via-white/[0.12] to-white/[0.08] rounded-3xl sm:rounded-3xl pointer-events-none"></div>
            <div class="absolute inset-0 bg-gradient-to-b from-white/[0.15] via-transparent to-transparent rounded-3xl sm:rounded-3xl pointer-events-none"></div>

            <div class="px-6 py-3 flex items-center justify-between relative z-10">
                <div class="flex items-center">
                <a [routerLink]="['/']" [routerLinkActive]="'active'" [routerLinkActiveOptions]="{exact: true}">
                    <h1 class="text-lg md:text-xl">TFG</h1>
                </a>
                </div>

                <div class="lg:hidden">
                <button (click)="toggleOpen()" class="p-2 rounded-lg hover:bg-white/10 transition">
                    @if (menuOpen()) {
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-gray-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                        </svg>
                    } @else {
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-gray-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                        </svg>
                    }

                </button>
                </div>

                <div class="hidden lg:flex justify-around items-center gap-6">
                    <a href="#caracteristics" class="hover:bg-white/10 rounded-xl hover:text-white px-3 py-2 transition-all duration-300">Características</a>
                    <a href="#about-us" class="hover:bg-white/10 rounded-xl hover:text-white px-3 py-2 transition-all duration-300">Sobre nosotros</a>
                    @if (authService.isLoggedIn()) {
                        <a [routerLink]="['/dashboard']" class="bg-gradient-to-r from-[#39BDFF] to-[#64DDFF] hover:from-[#2DA8E8] hover:to-[#51CAEF] text-slate-950 font-bold px-5 py-2 rounded-xl shadow-lg shadow-[#39BDFF]/30 hover:shadow-[#39BDFF]/50 hover:scale-105 transition-all duration-300">Panel de control</a>
                    } @else {
                        <a [routerLink]="['/login']" class="hover:bg-white/10 rounded-xl hover:text-white px-3 py-2 transition-all duration-300">Iniciar sesión</a>
                        <a [routerLink]="['/register']" class="bg-gradient-to-r from-[#39BDFF] to-[#64DDFF] hover:from-[#2DA8E8] hover:to-[#51CAEF] text-slate-950 font-bold px-5 py-2 rounded-xl shadow-lg shadow-[#39BDFF]/30 hover:shadow-[#39BDFF]/50 hover:scale-105 transition-all duration-300">Registrarse</a>
                    }
                   </div>
            </div>

            @if(menuOpen()) {
                <div class="lg:hidden px-6 pb-4 flex flex-col gap-3 animate-slide-down">
                    <a href="#caracteristics" class="hover:bg-white/10 rounded-xl hover:text-white px-3 py-2 transition-all duration-300">Características</a>
                    <a href="#about-us" class="hover:bg-white/10 rounded-xl hover:text-white px-3 py-2 transition-all duration-300">Sobre nosotros</a>
                    @if (authService.isLoggedIn()) {
                        <a [routerLink]="['/dashboard']" class="bg-gradient-to-r from-[#39BDFF] to-[#64DDFF] hover:from-[#2DA8E8] hover:to-[#51CAEF] text-slate-950 font-bold px-5 py-2 rounded-xl shadow-lg shadow-[#39BDFF]/30 hover:shadow-[#39BDFF]/50 hover:scale-105 transition-all duration-300">Panel de control</a>
                    } @else {
                        <a [routerLink]="['/login']" class="hover:bg-white/10 rounded-xl hover:text-white px-3 py-2 transition-all duration-300">Iniciar sesión</a>
                        <a [routerLink]="['/register']" class="bg-gradient-to-r from-[#39BDFF] to-[#64DDFF] hover:from-[#2DA8E8] hover:to-[#51CAEF] text-slate-950 font-bold px-5 py-2 rounded-xl shadow-lg shadow-[#39BDFF]/30 hover:shadow-[#39BDFF]/50 hover:scale-105 transition-all duration-300">Registrarse</a>
                    }
                </div>
            }
        </header>
    </div>
</div>
