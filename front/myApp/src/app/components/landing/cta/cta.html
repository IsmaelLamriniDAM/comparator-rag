<section class="text-center max-w-3xl mx-auto pt-20 lg:pt-40">
    
    <div class="glass-card rounded-2xl p-8 relative">
        <div class="absolute inset-0 bg-gradient-to-r from-[#39BDFF]/15 to-[#64DDFF]/15 blur-3xl rounded-full pointer-events-none"></div>
        <h3 class="text-white text-3xl font-bold">¡Encuentra tus oportunidades ahora mismo!</h3>
        <p class="text-slate-400 font-semibold mt-2">Únete a cientos de usuarios que ya están tomando decisiones con nosotros.</p>
        <div class="flex items-center justify-center gap-5 mt-5">
            <button class="p-3 bg-gradient-to-r from-[#39BDFF] to-[#64DDFF] cursor-pointer rounded-2xl text-slate-950 font-bold hover:scale-105 transition-all duration-300">
                <div [routerLink]="['/register']" [routerLinkActive]="'active'" [routerLinkActiveOptions]="{exact: true}" class="text-center flex items-center justify-center gap-3">
                    Crear cuenta
                    <i class="pi pi-arrow-right text-slate-950"></i>
                </div>
            </button>
            <button class="p-3 border-2 border-slate-700 bg-transparent cursor-pointer rounded-2xl text-slate-300 hover:text-white hover:bg-slate-800 font-bold transition-all duration-300">
                <div [routerLink]="['/login']" [routerLinkActive]="'active'" [routerLinkActiveOptions]="{exact: true}" class="text-center flex items-center justify-center gap-3">
                    Ya tengo cuenta
                </div>
            </button>
        </div>
    
    </div>

</section>
