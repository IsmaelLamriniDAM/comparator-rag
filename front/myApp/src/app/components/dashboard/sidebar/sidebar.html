<aside class="glass border-r border-white/10 h-screen fixed top-0 left-0 transition-all duration-500 ease-in-out {{collapsed() ? 'w-16' : 'w-64'}} ">
    <div class="flex flex-col h-full p-3">
        <div class="flex mb-6 mt-6 justify-between items-center">
            @if (!collapsed()) {        
                <h3 [routerLink]="['/']" [routerLinkActive]="'active'" [routerLinkActiveOptions]="{exact: true}" class="text-slate-400 cursor-pointer font-extrabold text-lg whitespace-nowrap opacity-0 animate-fade-in2">TFG</h3>
                <i (click)="changeCollapsed()" class="pi pi-angle-left text-slate-400 hover:bg-slate-700 p-3 rounded-xl cursor-pointer hover:text-white"></i>
            } @else {
                <i (click)="changeCollapsed()" class="pi pi-angle-right text-slate-400 hover:bg-slate-700 p-3 rounded-xl cursor-pointer hover:text-white"></i>
            }
        </div>
        <nav class="flex-1 space-y-2">
            @for (item of sidebarItems(); track $index) {
                <button 
                (click)="changeActive(item.id)" 
                class="w-full flex items-center gap-3 px-3 py-3 rounded-lg 
                            cursor-pointer
                            {{ item.active 
                                ? 'bg-gradient-to-r from-[#39BDFF]/20 to-[#64DDFF]/20 text-[#64DDFF] border border-[#39BDFF]/30' 
                                : 'text-slate-400 hover:text-white hover:bg-white/5' }}">
                    <i [class]="item.icon + ' pi ' + (item.active ? 'text-[#39BDFF]' : '')"></i>
                    @if(!collapsed()){
                        <p class="text-medium font-semibold duration-500 ease-in-out transition-all {{collapsed() ? 'opacity-0' : 'opacity-100'}}">{{ item.title }}</p>
                    }
                    @if(item.title === 'IA') {
                        <span class="ms-auto text-xs opacity-50">Beta 0.0.1</span>
                    }
                </button>
            }
        </nav>

        @if (!collapsed()) {
        <div class="pt-4 border-t border-white/10 whitespace-nowrap opacity-0 animate-fade-in">
            <div class="glass-card p-3 rounded-lg">
                <div class="flex items-center gap-2 mb-2">
                    <i class="pi-chart-bar pi text-[#39BDFF]"></i>
                    <span class="text-xs font-medium text-white">Plan actual</span>
                </div>
                <p class="text-xs text-slate-400">Plan PRO</p>
                <div class="mt-2 h-1.5 bg-slate-800 rounded-full overflow-hidden">
                    <div [style.width.%]="percentageComparationsUsed()" class="h-full bg-gradient-to-r from-[#39BDFF] to-[#64DDFF] rounded-full"></div>
                </div>
                <p class="text-xs text-slate-500 mt-1">{{ comparationsNumber() }}<!--/{{ maxComparationsNumber() }} --> comparaciones este mes</p>
            </div>
        </div>
        }
    </div>
</aside>
