<div class="glass border-b border-white/10 h-[100vh] overflow-hidden w-10 
        transition-all duration-300 ease-in-out"  [ngClass]="{
        'w-60' : isOpenMenu()
    }">
    <div
        class="w-full"
        [ngClass]="isOpenMenu() ? 'grid grid-rows-[1fr_1fr_15fr_2fr] p-4' : 'flex lg:justify-center lg:items-center lg:p-4 justify-start items-start p-0'"
    >
        <div class="flex  p-2 w-full"  
        [ngClass]="isOpenMenu() ? 'justify-between' : 'justify-center items-center'">

            <i class="pi pi-bars hover:bg-slate-700
            hover:rounded-xl p-2 cursor-pointer" (click)="changeStatusMenu()"></i>

            @if(isOpenMenu()) {
                <i class="pi pi-plus hover:bg-slate-700
                hover:rounded-xl p-2 cursor-pointer" (click)="clickNewConversation()"></i>
            }
        </div>

        @if (isOpenMenu()) {
            <div>
                <h3 class="text-slate-400 font-extrabold text-lg text-center">Historial IA</h3>
        
                <div class="border-b-1 border-slate-700"></div>

            </div>
            <app-list-history-messages  [histories] = "listDataHistories()" (deleteIdHistory)="deleteOneHistory($event)" (viewMessagesEvent)="viewMessagesHistory($event)"></app-list-history-messages>
            <div class="border-t-1 border-slate-800 flex items-center justify-center">
                <button class="rounded-xl bg-gradient-to-b from-red-900 to-orange-500 p-1 cursor-pointer hover:scale-105 transition-transform duration-300 ease-in-out" (click) = "deleteAllHistories()">Eliminar Conversaciones</button>
            </div>
        }
    </div>

</div>
