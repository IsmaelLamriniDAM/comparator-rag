<div class="flex flex-col gap-4 text-center h-173 overflow-hidden items-center overflow-y-scroll overflow-x-hidden p-1">
    @for(history of histories(); track $index) {
        <div class="border-1 border-slate-600 rounded-3xl flex justify-between items-center p-1 shadow-md shadow-slate-600/50 bg-gradient-to-r from-slate-800 to-slate-900 hover:scale-110 duration-300 w-40 cursor-default" (click)="clickViewMessages(history)">
            <div class="flex items-center">
                {{history.title}}
            </div>
            <div class="flex items-center hover:scale-110 cursor-pointer" (click)="deleteHistory(history.idShare)">
                <i class="pi pi-trash" style="color: red"></i>
            </div>
        </div>
    }
</div>
