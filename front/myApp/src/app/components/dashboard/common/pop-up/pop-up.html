
<div class="fixed inset-0 z-50 flex items-center justify-center {{popupVisible() ? '' : 'hidden'}}">
  
  <div class="absolute inset-0 bg-black/60"></div>

  <div class="relative bg-slate-800 p-5 rounded-2xl flex flex-col items-center justify-center text-center shadow-lg max-w-md w-full mx-4 animate-fade-in2">
    <div class="bg-red-500/20 rounded-full w-20 h-20 flex items-center justify-center mb-2">
        <i class="pi-exclamation-circle pi text-red-500" style="font-size: 1.5rem;"></i>
    </div>
    <h3 class="text-lg sm:text-xl font-semibold text-white">¿Estás seguro de que quieres hacer esto?</h3>
    <p class="text-slate-400 text-center">{{dataDeleteConfirm()?.message}}</p>
    <div class="flex gap-5 mt-5">
        <button (click)="makeAction()" class="px-3 py-1 text-medium cursor-pointer rounded-lg bg-red-500/20 text-red-400 hover:bg-red-500/40 transition flex items-center justify-center">
            Eliminar
        </button>
        <button (click)="closePopup()" class="px-3 py-1 text-medium cursor-pointer rounded-lg border-3 border-slate-700 text-slate-400 hover:border-slate-600 hover:text-slate-300 transition flex items-center justify-center">
            Cancelar
        </button>
    </div>
  </div>
</div>
